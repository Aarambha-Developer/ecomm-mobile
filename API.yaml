          minLength: 1
          maxLength: 255
        phone:
          type: string
          minLength: 1
          maxLength: 20
        province:
          type: string
          minLength: 1
          maxLength: 100
        district:
          type: string
          minLength: 1
          maxLength: 100
        municipality:
          type: string
          minLength: 1
          maxLength: 100
        street:
          type: string
          minLength: 1
        zip_code:
          type: string
          maxLength: 20
        label:
          type: string
          maxLength: 50
        is_default:
          type: boolean
      required:
      - district
      - full_name
      - municipality
      - phone
      - province
      - street
    Wishlist:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/WishlistItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
      - updated_at
    WishlistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/ProductList'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - product
    WishlistItemCreate:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
      required:
      - product_id
    WishlistItemCreateRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
      required:
      - product_id
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    cookieJWT:
      type: apiKey
      in: cookie
      name: access_token
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
